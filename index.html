<!DOCTYPE html>
<html lang="en">.    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Web AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --c: #00e5ff;
    --c2: rgba(0,229,255,0.15);
    --c3: rgba(0,229,255,0.04);
    --red: #ff3860;
    --gold: #ffd700;
    --bg: #010a0f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--c);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events:none;
  }

  /* Scanlines */
  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none;
    z-index:50;
  }

  /* Corners */
  .corner { position:fixed; width:72px; height:72px; opacity:0.45; }
  .corner svg { width:100%; height:100%; }
  .c-tl{top:16px;left:16px;}
  .c-tr{top:16px;right:16px;transform:scaleX(-1);}
  .c-bl{bottom:16px;left:16px;transform:scaleY(-1);}
  .c-br{bottom:16px;right:16px;transform:scale(-1,-1);}

  /* API Key setup */
  #setup {
    position:fixed; inset:0;
    background: rgba(1,10,15,0.97);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    z-index:200;
  }
  #setup h2 {
    font-family:'Orbitron',sans-serif;
    font-size:1rem; letter-spacing:8px;
    text-shadow:0 0 20px var(--c);
  }
  #setup p { font-size:0.72rem; opacity:0.5; text-align:center; max-width:340px; line-height:1.6; }
  #setup a { color:var(--gold); }
  #apiInput {
    background: transparent;
    border: 1px solid var(--c);
    color: var(--c);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 16px;
    width: 340px;
    outline: none;
    letter-spacing: 1px;
  }
  #apiInput::placeholder { opacity:0.3; }

  /* Title */
  h1 {
    font-family:'Orbitron',sans-serif;
    font-size: clamp(1.8rem,6vw,3rem);
    font-weight:900;
    letter-spacing:16px;
    text-shadow: 0 0 20px var(--c), 0 0 60px rgba(0,229,255,0.3);
    margin-bottom:4px;
  }
  .sub {
    font-size:0.55rem; letter-spacing:6px;
    opacity:0.35; margin-bottom:22px; text-transform:uppercase;
  }

  /* Arc */
  .arc-wrap {
    position:relative;
    width:clamp(190px,38vw,250px);
    height:clamp(190px,38vw,250px);
    margin-bottom:16px;
  }
  .ring {
    position:absolute; border-radius:50%; inset:0;
  }
  .r1{ border:1px solid rgba(0,229,255,0.12); animation:spin 14s linear infinite; }
  .r2{ inset:10px; border:1px dashed rgba(0,229,255,0.18); animation:spinR 9s linear infinite; }
  .r3{ inset:22px; border:2px solid transparent; border-top-color:var(--c); border-right-color:rgba(0,229,255,0.25); animation:spin 2.8s linear infinite; }
  .r4{ inset:36px; border:1px solid transparent; border-bottom-color:rgba(0,229,255,0.35); animation:spinR 5s linear infinite; }
  .r5{ inset:50px; border:1px dashed rgba(0,229,255,0.07); animation:spin 22s linear infinite; }

  .arc-core {
    position:absolute; inset:60px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,229,255,0.07) 0%,transparent 70%);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition: box-shadow 0.4s;
  }
  .arc-core.listening { animation: pulseGlow 0.9s ease-in-out infinite alternate; }
  .arc-core.thinking  { animation: pulseGlow 0.35s ease-in-out infinite alternate; }

  .state-icon  { font-size:2rem; line-height:1; }
  .state-label { font-size:0.5rem; letter-spacing:4px; margin-top:5px; opacity:0.55; text-transform:uppercase; }

  /* Waveform */
  .waveform {
    display:flex; align-items:center; gap:3px; height:30px;
    margin-bottom:14px; transition:opacity 0.3s;
  }
  .wbar {
    width:3px; border-radius:2px; background:var(--c);
    animation: wave 0.8s ease-in-out infinite;
  }

  /* Log */
  .j-log {
    width:min(560px,90vw); max-height:130px;
    overflow-y:auto;
    background:var(--c3);
    border:1px solid rgba(0,229,255,0.1);
    border-radius:3px;
    padding:10px 14px;
    font-size:0.73rem; line-height:1.8;
    margin-bottom:18px;
    scrollbar-width:thin;
    scrollbar-color:rgba(0,229,255,0.2) transparent;
  }
  .ll { display:block; animation:fadeIn 0.25s ease; }
  .ll.you { color:var(--gold); }
  .ll.ai  { color:var(--c); }
  .ll.sys { color:rgba(0,229,255,0.38); font-size:0.68rem; }
  .ll .px { opacity:0.45; margin-right:6px; }

  /* Controls */
  .controls { display:flex; gap:10px; align-items:center; }

  .btn {
    font-family:'Orbitron',sans-serif;
    font-size:0.55rem; letter-spacing:4px;
    padding:10px 20px;
    background:transparent;
    border:1px solid var(--c); color:var(--c);
    cursor:pointer; text-transform:uppercase;
    transition:all 0.18s;
  }
  .btn:hover:not(:disabled) { background:var(--c); color:var(--bg); }
  .btn:disabled { opacity:0.25; cursor:not-allowed; }
  .btn.red { border-color:var(--red); color:var(--red); }
  .btn.red:hover:not(:disabled) { background:var(--red); color:var(--bg); }

  .wake-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--red); box-shadow:0 0 6px var(--red);
    transition:all 0.3s; flex-shrink:0;
  }
  .wake-dot.on { background:#00ff88; box-shadow:0 0 8px #00ff88; animation:blink 2s infinite; }

  /* Animations */
  @keyframes spin  { to{transform:rotate(360deg)} }
  @keyframes spinR { to{transform:rotate(-360deg)} }
  @keyframes pulseGlow {
    from{box-shadow:0 0 0px rgba(0,229,255,0)}
    to{box-shadow:0 0 40px rgba(0,229,255,0.45),0 0 80px rgba(0,229,255,0.15)}
  }
  @keyframes wave {
    0%,100%{height:4px;opacity:0.3}
    50%{height:24px;opacity:1}
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- API Key Setup Screen -->
<div id="setup">
  <h2>⬡ JARVIS SETUP</h2>
  <p>Enter your free <a href="https://console.groq.com" target="_blank">Groq API key</a> to activate.<br>Get one free at console.groq.com</p>
  <input id="apiInput" type="password" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" />
  <button class="btn" onclick="saveKey()">INITIALIZE SYSTEM</button>
  <p style="font-size:0.62rem;opacity:0.3">Key is stored locally in your browser only.</p>
</div>

<!-- Corners -->
<div class="corner c-tl"><svg viewBox="0 0 72 72" fill="none" stroke="#00e5ff"><path d="M2 36L2 2L36 2" stroke-width="2"/><path d="M2 18L2 2L18 2" stroke-width="0.5" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#00e5ff"/></svg></div>
<div class="corner c-tr"><svg viewBox="0 0 72 72" fill="none" stroke="#00e5ff"><path d="M2 36L2 2L36 2" stroke-width="2"/><path d="M2 18L2 2L18 2" stroke-width="0.5" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#00e5ff"/></svg></div>
<div class="corner c-bl"><svg viewBox="0 0 72 72" fill="none" stroke="#00e5ff"><path d="M2 36L2 2L36 2" stroke-width="2"/><path d="M2 18L2 2L18 2" stroke-width="0.5" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#00e5ff"/></svg></div>
<div class="corner c-br"><svg viewBox="0 0 72 72" fill="none" stroke="#00e5ff"><path d="M2 36L2 2L36 2" stroke-width="2"/><path d="M2 18L2 2L18 2" stroke-width="0.5" opacity="0.5"/><circle cx="2" cy="2" r="2.5" fill="#00e5ff"/></svg></div>

<h1>JARVIS</h1>
<p class="sub">Just A Rather Very Intelligent System</p>

<!-- Arc -->
<div class="arc-wrap">
  <div class="ring r1"></div><div class="ring r2"></div>
  <div class="ring r3"></div><div class="ring r4"></div>
  <div class="ring r5"></div>
  <div class="arc-core" id="arcCore">
    <div class="state-icon" id="stateIcon">⬡</div>
    <div class="state-label" id="stateLabel">OFFLINE</div>
  </div>
</div>

<!-- Waveform -->
<div class="waveform" id="waveform" style="opacity:0">
  <div class="wbar" style="animation-delay:0s"></div>
  <div class="wbar" style="animation-delay:0.1s"></div>
  <div class="wbar" style="animation-delay:0.2s"></div>
  <div class="wbar" style="animation-delay:0.3s"></div>
  <div class="wbar" style="animation-delay:0.2s"></div>
  <div class="wbar" style="animation-delay:0.1s"></div>
  <div class="wbar" style="animation-delay:0s"></div>
</div>

<!-- Log -->
<div class="j-log" id="jlog">
  <span class="ll sys"><span class="px">›</span>System initialized. Press START.</span>
</div>

<!-- Controls -->
<div class="controls">
  <div class="wake-dot" id="wakeDot"></div>
  <button class="btn" id="startBtn" onclick="startSystem()">START</button>
  <button class="btn" id="speakBtn" onclick="listenOnce()" disabled>SPEAK</button>
  <button class="btn red" id="stopBtn" onclick="stopSystem()" disabled>STOP</button>
</div>

<script>
  let GROQ_KEY = localStorage.getItem('jarvis_groq_key') || '';
  let isAwake = false, isRunning = false;
  let recRef = null;

  const $ = id => document.getElementById(id);

  // Skip setup if key already saved
  if (GROQ_KEY) $('setup').style.display = 'none';

  function saveKey() {
    const val = $('apiInput').value.trim();
    if (!val) return;
    GROQ_KEY = val;
    localStorage.setItem('jarvis_groq_key', val);
    $('setup').style.display = 'none';
  }

  /* ── Log ── */
  function addLog(type, text) {
    const log = $('jlog');
    const px = { you:'▸ YOU', ai:'◈ AI', sys:'›' }[type];
    const el = document.createElement('span');
    el.className = 'll ' + type;
    el.innerHTML = `<span class="px">${px}</span>${text}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  /* ── State ── */
  function setState(mode) {
    const map = {
      offline:   ['⬡','OFFLINE'],
      idle:      ['⬡','STANDBY'],
      listening: ['◉','LISTENING'],
      thinking:  ['⟳','PROCESSING'],
      speaking:  ['◈','SPEAKING'],
    };
    const [icon, label] = map[mode] || ['⬡', mode];
    $('stateIcon').textContent = icon;
    $('stateLabel').textContent = label;
    $('arcCore').className = 'arc-core ' + mode;
    $('waveform').style.opacity = mode === 'listening' ? '1' : '0';
    $('wakeDot').className = 'wake-dot' + (isAwake ? ' on' : '');
  }

  /* ── Speak ── */
  function speak(text) {
    return new Promise(resolve => {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.92; u.pitch = 0.82;
      setState('speaking');
      u.onend = resolve;
      speechSynthesis.speak(u);
    });
  }

  /* ── Groq API ── */
  async function askGroq(prompt) {
    setState('thinking');
    addLog('sys', 'Querying Groq...');
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_KEY
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 150,
          messages: [
            { role: 'system', content: "You are JARVIS, Tony Stark's AI. Be witty, concise (2-3 sentences max), confident, slightly formal. Never break character." },
            { role: 'user', content: prompt }
          ]
        })
      });
      const data = await res.json();
      if (data.error) return 'Error: ' + data.error.message;
      return data.choices?.[0]?.message?.content || 'Unable to process request.';
    } catch {
      return 'Connectivity error. Check your API key.';
    }
  }

  /* ── Listen ── */
  function listenOnce() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { addLog('sys','Speech recognition not supported. Use Chrome.'); return; }

    const rec = new SR();
    recRef = rec;
    rec.lang = 'en-US';
    rec.interimResults = false;

    setState('listening');
    $('speakBtn').disabled = true;

    rec.onresult = async (e) => {
      const text = e.results[0][0].transcript.toLowerCase().trim();
      addLog('you', text);

      if (!isAwake) {
        if (text.includes('jarvis')) {
          isAwake = true;
          setState('idle');
          await speak('Yes? How can I assist you?');
        } else {
          addLog('sys', 'Say "Jarvis" to wake me.');
          setState('idle');
        }
        if (isRunning) $('speakBtn').disabled = false;
        return;
      }

      if (['sleep','goodbye','shut down','stand by'].some(w => text.includes(w))) {
        isAwake = false;
        setState('idle');
        await speak('Going to sleep. Call my name when needed.');
        setState('idle');
        if (isRunning) $('speakBtn').disabled = false;
        return;
      }

      const reply = await askGroq(text);
      addLog('ai', reply);
      await speak(reply);
      setState('idle');
      if (isRunning) $('speakBtn').disabled = false;
    };

    rec.onerror = (e) => {
      addLog('sys', 'Mic error: ' + e.error);
      setState('idle');
      if (isRunning) $('speakBtn').disabled = false;
    };

    rec.start();
  }

  /* ── Start / Stop ── */
  async function startSystem() {
    if (!GROQ_KEY) { $('setup').style.display = 'flex'; return; }
    isRunning = true;
    $('startBtn').disabled = true;
    $('speakBtn').disabled = false;
    $('stopBtn').disabled = false;
    addLog('sys', 'System online. Say "Jarvis" to wake.');
    await speak('JARVIS online. Say my name to begin.');
    setState('idle');
  }

  function stopSystem() {
    isRunning = false; isAwake = false;
    speechSynthesis.cancel();
    if (recRef) { try { recRef.abort(); } catch {} }
    $('startBtn').disabled = false;
    $('speakBtn').disabled = true;
    $('stopBtn').disabled = true;
    setState('offline');
    addLog('sys', 'System offline.');
  }

  // Enter key on API input
  $('apiInput').addEventListener('keydown', e => { if (e.key==='Enter') saveKey(); });
</script>
</body>
</html>
