<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Web AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --cyan: #00e5ff;
    --cyan-dim: rgba(0,229,255,0.15);
    --cyan-mid: rgba(0,229,255,0.4);
    --red: #ff3860;
    --gold: #ffd700;
    --bg: #010a0f;
    --panel: rgba(0,229,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ─── Grid Background ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ─── Scanlines ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ─── Corner HUD Decorations ─── */
  .hud-corner {
    position: fixed;
    width: 80px;
    height: 80px;
    opacity: 0.5;
  }
  .hud-corner svg { width: 100%; height: 100%; }
  .hud-tl { top: 20px; left: 20px; }
  .hud-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .hud-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .hud-br { bottom: 20px; right: 20px; transform: scale(-1,-1); }

  /* ─── Rotating Arc ─── */
  .arc-container {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 24px;
  }

  .arc-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: spin linear infinite;
  }
  .arc-ring-1 {
    border: 1px solid rgba(0,229,255,0.15);
    animation-duration: 12s;
  }
  .arc-ring-2 {
    inset: 12px;
    border: 1px dashed rgba(0,229,255,0.2);
    animation-duration: 8s;
    animation-direction: reverse;
  }
  .arc-ring-3 {
    inset: 24px;
    border: 2px solid transparent;
    border-top-color: var(--cyan);
    border-right-color: rgba(0,229,255,0.3);
    animation-duration: 3s;
  }
  .arc-ring-4 {
    inset: 38px;
    border: 1px solid transparent;
    border-bottom-color: var(--cyan-mid);
    animation-duration: 5s;
    animation-direction: reverse;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .arc-inner {
    position: absolute;
    inset: 55px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .state-icon {
    font-size: 2.2rem;
    line-height: 1;
    transition: all 0.4s;
  }

  .state-label {
    font-size: 0.55rem;
    letter-spacing: 4px;
    margin-top: 6px;
    opacity: 0.6;
    text-transform: uppercase;
  }

  /* Pulse when active */
  .arc-inner.listening { animation: pulse-glow 1s ease-in-out infinite alternate; }
  .arc-inner.thinking  { animation: pulse-glow 0.4s ease-in-out infinite alternate; }

  @keyframes pulse-glow {
    from { box-shadow: 0 0 0px rgba(0,229,255,0); }
    to   { box-shadow: 0 0 30px rgba(0,229,255,0.35); }
  }

  /* ─── Title ─── */
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 18px;
    text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,229,255,0.3);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.6rem;
    letter-spacing: 8px;
    opacity: 0.4;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* ─── Log Panel ─── */
  .log-panel {
    width: min(580px, 92vw);
    max-height: 160px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 4px;
    padding: 12px 16px;
    font-size: 0.78rem;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan-dim) transparent;
    margin-bottom: 20px;
  }

  .log-line { display: block; }
  .log-line.you  { color: var(--gold); }
  .log-line.ai   { color: var(--cyan); }
  .log-line.sys  { color: rgba(0,229,255,0.4); font-size: 0.7rem; }

  .log-line .prefix { opacity: 0.5; margin-right: 6px; }

  /* ─── Controls Row ─── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 4px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); }

  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger::before { background: var(--red); }
  .btn.danger:hover { color: var(--bg); }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Wake indicator */
  .wake-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
    box-shadow: 0 0 6px currentColor;
  }
  .wake-dot.awake { background: #00ff88; }

  /* ─── Waveform ─── */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
    margin-bottom: 16px;
  }
  .waveform.active { opacity: 1; }
  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--cyan);
    animation: wave 0.8s ease-in-out infinite;
  }
  .bar:nth-child(1) { animation-delay: 0.0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.2s; }
  .bar:nth-child(6) { animation-delay: 0.1s; }
  .bar:nth-child(7) { animation-delay: 0.0s; }

  @keyframes wave {
    0%, 100% { height: 4px; opacity: 0.3; }
    50%       { height: 22px; opacity: 1; }
  }

  /* ─── Glitch text ─── */
  @keyframes glitch {
    0%   { clip-path: inset(0 0 95% 0); transform: translateX(-3px); }
    10%  { clip-path: inset(40% 0 50% 0); transform: translateX(3px); }
    20%  { clip-path: inset(0); transform: translateX(0); }
    100% { clip-path: inset(0); transform: translateX(0); }
  }
</style>
</head>
<body>

<!-- HUD Corners -->
<div class="hud-corner hud-tl"><svg viewBox="0 0 80 80" fill="none" stroke="#00e5ff">
  <path d="M2 40 L2 2 L40 2" stroke-width="2"/>
  <path d="M2 20 L2 2 L20 2" stroke-width="0.5" opacity="0.5"/>
  <circle cx="2" cy="2" r="3" fill="#00e5ff"/>
</svg></div>
<div class="hud-corner hud-tr"><svg viewBox="0 0 80 80" fill="none" stroke="#00e5ff">
  <path d="M2 40 L2 2 L40 2" stroke-width="2"/>
  <path d="M2 20 L2 2 L20 2" stroke-width="0.5" opacity="0.5"/>
  <circle cx="2" cy="2" r="3" fill="#00e5ff"/>
</svg></div>
<div class="hud-corner hud-bl"><svg viewBox="0 0 80 80" fill="none" stroke="#00e5ff">
  <path d="M2 40 L2 2 L40 2" stroke-width="2"/>
  <path d="M2 20 L2 2 L20 2" stroke-width="0.5" opacity="0.5"/>
  <circle cx="2" cy="2" r="3" fill="#00e5ff"/>
</svg></div>
<div class="hud-corner hud-br"><svg viewBox="0 0 80 80" fill="none" stroke="#00e5ff">
  <path d="M2 40 L2 2 L40 2" stroke-width="2"/>
  <path d="M2 20 L2 2 L20 2" stroke-width="0.5" opacity="0.5"/>
  <circle cx="2" cy="2" r="3" fill="#00e5ff"/>
</svg></div>

<!-- Main UI -->
<h1>JARVIS</h1>
<p class="subtitle">Just A Rather Very Intelligent System</p>

<div class="arc-container">
  <div class="arc-ring arc-ring-1"></div>
  <div class="arc-ring arc-ring-2"></div>
  <div class="arc-ring arc-ring-3"></div>
  <div class="arc-ring arc-ring-4"></div>
  <div class="arc-inner" id="arcInner">
    <div class="state-icon" id="stateIcon">⬡</div>
    <div class="state-label" id="stateLabel">OFFLINE</div>
  </div>
</div>

<div class="waveform" id="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="log-panel" id="log">
  <span class="log-line sys"><span class="prefix">›</span>System initialized. Press START.</span>
</div>

<div class="controls">
  <div class="wake-dot" id="wakeDot"></div>
  <button class="btn" id="startBtn" onclick="startSystem()">START</button>
  <button class="btn" id="listenBtn" onclick="listenOnce()" disabled>SPEAK</button>
  <button class="btn danger" id="stopBtn" onclick="stopSystem()" disabled>STOP</button>
</div>

<script>
  let isAwake = false;
  let isRunning = false;
  let autoListen = false;
  let currentRecognition = null;

  const log        = document.getElementById('log');
  const arcInner   = document.getElementById('arcInner');
  const stateIcon  = document.getElementById('stateIcon');
  const stateLabel = document.getElementById('stateLabel');
  const waveform   = document.getElementById('waveform');
  const wakeDot    = document.getElementById('wakeDot');
  const startBtn   = document.getElementById('startBtn');
  const listenBtn  = document.getElementById('listenBtn');
  const stopBtn    = document.getElementById('stopBtn');

  /* ── Logging ── */
  function addLog(type, text) {
    const line = document.createElement('span');
    line.className = 'log-line ' + type;
    const prefix = { you: '▸ YOU', ai: '◈ AI', sys: '›' }[type] || '›';
    line.innerHTML = `<span class="prefix">${prefix}</span>${text}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  /* ── State Display ── */
  function setState(mode) {
    arcInner.className = 'arc-inner ' + mode;
    waveform.className = 'waveform' + (mode === 'listening' ? ' active' : '');
    const map = {
      idle:      ['⬡', 'STANDBY'],
      listening: ['◉', 'LISTENING'],
      thinking:  ['⟳', 'PROCESSING'],
      speaking:  ['◈', 'SPEAKING'],
      offline:   ['⬡', 'OFFLINE'],
    };
    const [icon, label] = map[mode] || ['⬡', mode.toUpperCase()];
    stateIcon.textContent = icon;
    stateLabel.textContent = label;
    wakeDot.className = 'wake-dot' + (isAwake ? ' awake' : '');
  }

  /* ── Speech Synthesis ── */
  function speak(text) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.95;
      u.pitch = 0.85;
      setState('speaking');
      u.onend = () => { setState(isAwake ? 'idle' : 'idle'); resolve(); };
      window.speechSynthesis.speak(u);
    });
  }

  /* ── Claude API ── */
  async function askClaude(prompt) {
    setState('thinking');
    addLog('sys', 'Querying AI...');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are JARVIS, a witty and intelligent AI assistant. Keep responses concise (2-3 sentences max). Speak in a calm, confident, slightly formal tone like Tony Stark\'s assistant.',
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      return data.content?.[0]?.text || 'I encountered an issue processing that request.';
    } catch {
      return 'Connectivity issue detected. Please try again.';
    }
  }

  /* ── Listen Once ── */
  function listenOnce() {
    if (!isRunning) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      addLog('sys', 'Speech recognition not supported in this browser.');
      return;
    }

    const rec = new SpeechRecognition();
    currentRecognition = rec;
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    setState('listening');
    listenBtn.disabled = true;

    rec.onresult = async (e) => {
      const text = e.results[0][0].transcript.toLowerCase().trim();
      addLog('you', text);

      // Wake / sleep logic
      if (!isAwake) {
        if (text.includes('jarvis')) {
          isAwake = true;
          wakeDot.className = 'wake-dot awake';
          await speak('Yes? How can I assist?');
          if (isRunning) listenBtn.disabled = false;
        } else {
          addLog('sys', 'Say "Jarvis" to wake me.');
          setState('idle');
          if (isRunning) listenBtn.disabled = false;
        }
        return;
      }

      if (text.includes('sleep') || text.includes('goodbye') || text.includes('goodbye jarvis')) {
        isAwake = false;
        wakeDot.className = 'wake-dot';
        await speak('Going to sleep. Say my name when you need me.');
        setState('idle');
        if (isRunning) listenBtn.disabled = false;
        return;
      }

      const reply = await askClaude(text);
      addLog('ai', reply);
      await speak(reply);
      if (isRunning) listenBtn.disabled = false;
    };

    rec.onerror = (e) => {
      addLog('sys', 'Mic error: ' + e.error);
      setState('idle');
      if (isRunning) listenBtn.disabled = false;
    };

    rec.onend = () => {
      if (stateLabel.textContent === 'LISTENING') {
        setState('idle');
        if (isRunning) listenBtn.disabled = false;
      }
    };

    rec.start();
  }

  /* ── System Start/Stop ── */
  async function startSystem() {
    isRunning = true;
    startBtn.disabled = true;
    listenBtn.disabled = false;
    stopBtn.disabled = false;
    setState('idle');
    addLog('sys', 'System online. Say "Jarvis" to wake.');
    await speak('JARVIS online. Say my name to begin.');
  }

  function stopSystem() {
    isRunning = false;
    isAwake = false;
    if (currentRecognition) { try { currentRecognition.abort(); } catch {} }
    window.speechSynthesis.cancel();
    startBtn.disabled = false;
    listenBtn.disabled = true;
    stopBtn.disabled = true;
    wakeDot.className = 'wake-dot';
    setState('offline');
    addLog('sys', 'System offline.');
  }
</script>
</body>
</html>
